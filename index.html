<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片轉 GIF 工具 | Image to GIF Converter</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Cropper.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1><i class="fa-solid fa-wand-magic-sparkles"></i> 圖片轉 GIF 工具</h1>
            <p>快速將多張圖片轉換為高品質的 GIF 動畫</p>
        </header>

        <main class="app-main">
            <!-- Settings Section -->
            <section class="settings-panel glass-panel">
                <h2><i class="fa-solid fa-sliders"></i> 設定 (Settings)</h2>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label for="frame-duration" title="每張圖片顯示的秒數">每張圖片呈現時間 (秒)</label>
                        <input type="number" id="frame-duration" value="2" min="0.1" step="0.1">
                    </div>
                    <div class="setting-item">
                        <label for="aspect-ratio">GIF 比例</label>
                        <select id="aspect-ratio">
                            <option value="8:9" selected>8:9 (直式，如 800x900)</option>
                            <option value="1:1">1:1 (正方形，如 800x800)</option>
                            <option value="4:5">4:5 (IG 貼文，如 800x1000)</option>
                            <option value="16:9">16:9 (橫式，如 1600x900)</option>
                            <option value="9:16">9:16 (直式，如 900x1600)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="output-width">輸出寬度 (px)</label>
                        <input type="number" id="output-width" value="800" min="100" step="10">
                    </div>
                </div>
            </section>

            <!-- Upload Section -->
            <section class="upload-panel glass-panel">
                <div class="drop-zone" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
                    <h3>拖曳圖片至此，或點擊上傳</h3>
                    <p>支援 JPG, PNG, WEBP 格式 (可選取多張)</p>
                    <input type="file" id="file-input" multiple accept="image/*" hidden>
                    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                        選擇圖片
                    </button>
                    <button class="btn btn-danger" id="clear-images-btn" style="display:none; margin-top:10px;">
                        <i class="fa-solid fa-trash"></i> 清除所有圖片
                    </button>
                </div>
                
                <!-- Preview Area -->
                <div class="preview-container" id="preview-container">
                    <!-- Thumbnails will be injected here -->
                </div>
            </section>

            <!-- Action Section -->
            <section class="action-panel">
                <button class="btn btn-generate" id="generate-btn" disabled>
                    <i class="fa-solid fa-film"></i> 產生 GIF
                </button>
            </section>

            <!-- Result Section -->
            <section class="result-panel glass-panel hidden" id="result-panel">
                <h2><i class="fa-solid fa-check-circle"></i> 轉換完成！</h2>
                <div class="result-display">
                    <img id="result-gif" src="" alt="生成的 GIF" />
                </div>
                <div class="result-actions">
                    <a id="download-link" class="btn btn-success" download="animated.gif">
                        <i class="fa-solid fa-download"></i> 下載 GIF
                    </a>
                </div>
            </section>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay hidden" id="loading-overlay">
                <div class="spinner"></div>
                <p>正在生成 GIF，請稍候...</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </main>
        <!-- Crop Modal -->
        <div class="crop-modal hidden" id="crop-modal">
            <div class="crop-modal-content glass-panel">
                <div class="crop-header">
                    <h2><i class="fa-solid fa-crop-simple"></i> 裁切圖片</h2>
                    <button class="btn-close" id="close-crop-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="crop-body">
                    <div class="img-container">
                        <img id="crop-image" src="" alt="Picture to crop">
                    </div>
                </div>
                <div class="crop-footer">
                    <button class="btn btn-danger" id="cancel-crop-btn">取消</button>
                    <button class="btn btn-primary" id="save-crop-btn">儲存裁切</button>
                </div>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2026 奕鈞老師製作 | 版本 1.3 | Designed for excellent user experience.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
